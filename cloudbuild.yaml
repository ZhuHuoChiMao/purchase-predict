substitutions:
  _REGION: europe-west1
  _ARTIFACT_REPOSITORY: cloud-run-source-deploy
  _SERVICE_NAME: purchase-api
  _IMAGE_NAME: purchase-predict-api
  _MLFLOW_TRACKING_URI: http://104.197.20.252:5000
  _PURCHASE_MODEL_URI: models:/purchase_predict@production
  _SERVICE_ACCOUNT: ""

steps:
  - id: ci
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install uv
        uv run --extra dev ruff check src tests
        uv run --extra dev python -m pytest -q -o addopts=''

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        SERVICE_ACCOUNT_ARGS=""
        if [ -n "${_SERVICE_ACCOUNT}" ]; then
          SERVICE_ACCOUNT_ARGS="--service-account=${_SERVICE_ACCOUNT}"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --platform managed \
          --port 8080 \
          --allow-unauthenticated \
          --set-env-vars MLFLOW_TRACKING_URI=${_MLFLOW_TRACKING_URI},PURCHASE_MODEL_URI=${_PURCHASE_MODEL_URI} \
          $SERVICE_ACCOUNT_ARGS

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

timeout: 1200s
