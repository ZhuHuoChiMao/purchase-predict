test_ratio: 0.3
random_state: 40
raw_input_path: ../data
raw_input_pattern: part-*.csv
minimum_deployment_f1: 0.5
mlflow_enabled: false
mlflow_tracking_uri:
mlflow_experiment_name: purchase_predict_gcs
mlflow_registered_model_name: purchase_predict
mlflow_model_alias: production
models:
  - name: random_forest
    params:
      n_estimators: 120
      max_depth: 12
      min_samples_leaf: 3
      n_jobs: -1
  - name: gradient_boosting
    params:
      n_estimators: 80
      learning_rate: 0.08
      max_depth: 3
